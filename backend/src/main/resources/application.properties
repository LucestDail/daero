server.port=8090
spring.application.name=daero

# GTFS 데이터 위치(디렉토리 또는 .zip). 비어 있으면 로딩 스킵(빈 피드로 기동).
# 전국(KTDB) 적재 시 힙 부족(OOM) → ./start-backend.sh 로 -Xmx6g 주고 실행 권장.
# (경로에 공백 있으면 인자 파싱이 깨지므로 공백 없는 심볼릭 링크 사용: data/pt_gtfs_2024.zip)
daero.gtfs.path=../data/pt_gtfs_2024.zip

# prebuild 스냅샷 경로. 이 파일이 있으면 GTFS 파싱 없이 로드(저메모리·고속 기동).
# 없으면 GTFS로 빌드 후 이 경로에 저장하고 원본 피드를 해제한다.
daero.timetable.bin=../data/timetable.bin

# 대용량 stop_times 대비 (전국 GTFS)
spring.mvc.async.request-timeout=60000
