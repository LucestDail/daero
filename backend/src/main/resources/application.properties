server.port=8090
spring.application.name=daero

# GTFS 데이터 위치(디렉토리 또는 .zip). 비어 있으면 로딩 스킵(빈 피드로 기동).
# 전국(KTDB) 적재 시 힙 부족(OOM) → ./start-backend.sh 로 -Xmx6g 주고 실행 권장.
# (경로에 공백 있으면 인자 파싱이 깨지므로 공백 없는 심볼릭 링크 사용: data/pt_gtfs_2024.zip)
daero.gtfs.path=../data/pt_gtfs_2024.zip

# prebuild 스냅샷 경로. 이 파일이 있으면 GTFS 파싱 없이 로드(저메모리·고속 기동).
# 없으면 GTFS로 빌드 후 이 경로에 저장하고 원본 피드를 해제한다.
daero.timetable.bin=../data/timetable.bin

# 대용량 stop_times 대비 (전국 GTFS)
spring.mvc.async.request-timeout=60000

# 동시성 상한: RAPTOR 쿼리당 라벨 배열(~40MB) 재사용 풀(MAX_POOL=16)과 맞물려 힙 피크 제한(2GB 인스턴스 OOM 방지).
# threads.max 를 넘는 버스트는 accept-count 백로그에 큐잉(즉시 실패 대신 대기) → max-connections 로 총 연결 상한.
server.tomcat.threads.max=16
server.tomcat.accept-count=100
server.tomcat.max-connections=200

# TAGO 실시간 버스도착 API 인증키(디코딩 원본). 환경변수 TAGO_KEY로 주입, git 미포함.
tago.service-key=${TAGO_KEY:}

# 전국 버스정류장 위치정보 CSV(TAGO nodeId↔좌표 매핑용, CP949)
tago.stops.path=../data/bus_stops.csv

# 서울시 버스도착 API 인증키(디코딩 원본). 환경변수 SEOUL_BUS_KEY로 주입, git 미포함.
seoul.bus.service-key=${SEOUL_BUS_KEY:}
