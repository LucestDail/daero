<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>daero — 대중교통 경로탐색</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif; }
    #app { display: flex; height: 100vh; }
    #map { flex: 1; }
    #panel { width: 360px; padding: 16px; overflow-y: auto; border-left: 1px solid #e5e7eb; background: #fafafa; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: #6b7280; font-size: 12px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
    .o { background: #2563eb; } .d { background: #dc2626; }
    .coord { font-size: 12px; color: #374151; }
    label { font-size: 12px; color: #6b7280; }
    input[type=time] { padding: 4px 6px; }
    button { background: #111827; color: #fff; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; width: 100%; font-size: 14px; }
    button:disabled { opacity: .5; cursor: default; }
    .hint { background: #eff6ff; color: #1e40af; padding: 8px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
    .summary { margin: 14px 0 8px; padding: 12px; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; }
    .summary b { font-size: 20px; }
    .opt { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; background: #fff; cursor: pointer; }
    .opt.sel { border-color: #111827; box-shadow: 0 0 0 2px rgba(17,24,39,.08); }
    .optHead { font-size: 14px; }
    .optTag { display: inline-block; font-size: 11px; background: #111827; color: #fff; padding: 1px 7px; border-radius: 6px; margin-right: 6px; }
    .legs { margin-top: 6px; }
    .leg { display: flex; gap: 8px; padding: 8px 0; border-top: 1px dashed #e5e7eb; font-size: 13px; }
    .badge { flex: none; font-size: 11px; padding: 2px 7px; border-radius: 6px; color: #fff; height: fit-content; }
    .BUS { background: #2563eb; } .SUBWAY { background: #059669; } .RAIL { background: #7c3aed; }
    .AIR { background: #0891b2; } .WALK { background: #9ca3af; }
    .times { color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div id="panel">
    <h1>daero 대로</h1>
    <div class="sub">열린 대중교통 경로탐색</div>
    <div class="hint">지도를 클릭해 <b>출발</b>(파랑)과 <b>도착</b>(빨강)을 찍으세요.</div>
    <div class="row"><span class="dot o"></span><span class="coord" id="oText">출발 미지정</span></div>
    <div class="row"><span class="dot d"></span><span class="coord" id="dText">도착 미지정</span></div>
    <div class="row"><label>출발 시각</label><input type="time" id="time" value="09:00"/></div>
    <button id="go" disabled>경로 찾기</button>
    <div id="result"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([37.5665, 126.9780], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

  let origin = null, dest = null, oMarker = null, dMarker = null, routeLayer = null;
  const $ = (id) => document.getElementById(id);

  function mk(latlng, cls) {
    return L.circleMarker(latlng, { radius: 8, color: cls === 'o' ? '#2563eb' : '#dc2626',
      fillColor: cls === 'o' ? '#2563eb' : '#dc2626', fillOpacity: 1, weight: 2 }).addTo(map);
  }

  map.on('click', (e) => {
    if (!origin || (origin && dest)) {
      // 새 출발점(초기화)
      if (oMarker) map.removeLayer(oMarker);
      if (dMarker) map.removeLayer(dMarker);
      if (routeLayer) map.removeLayer(routeLayer);
      dest = null; dMarker = null; $('result').innerHTML = '';
      origin = e.latlng; oMarker = mk(origin, 'o');
      $('oText').textContent = `출발 ${origin.lat.toFixed(5)}, ${origin.lng.toFixed(5)}`;
      $('dText').textContent = '도착 미지정';
    } else {
      dest = e.latlng; dMarker = mk(dest, 'd');
      $('dText').textContent = `도착 ${dest.lat.toFixed(5)}, ${dest.lng.toFixed(5)}`;
    }
    $('go').disabled = !(origin && dest);
  });

  const modeKo = { BUS: '버스', SUBWAY: '지하철', RAIL: '기차', AIR: '항공', WALK: '도보' };

  $('go').addEventListener('click', async () => {
    if (!origin || !dest) return;
    $('go').disabled = true; $('go').textContent = '탐색 중…';
    try {
      const t = $('time').value || '09:00';
      const url = `/api/plan/coords?fromLat=${origin.lat}&fromLon=${origin.lng}&toLat=${dest.lat}&toLon=${dest.lng}&time=${t}`;
      const r = await fetch(url);
      const d = await r.json();
      render(d);
    } catch (err) {
      $('result').innerHTML = `<div class="hint">오류: ${err}</div>`;
    } finally {
      $('go').disabled = false; $('go').textContent = '경로 찾기';
    }
  });

  let options = [];
  let nodeLayer = null;
  const modeColor = { BUS: '#2563eb', SUBWAY: '#059669', RAIL: '#7c3aed', AIR: '#0891b2', FERRY: '#0d9488', WALK: '#9ca3af' };

  function render(d) {
    if (routeLayer) map.removeLayer(routeLayer);
    if (nodeLayer) map.removeLayer(nodeLayer);
    if (!d.found || !(d.options && d.options.length)) {
      $('result').innerHTML = '<div class="hint">경로를 찾지 못했어요.</div>'; return;
    }
    options = d.options;
    let html = `<div class="times" style="margin:6px 0">${d.queryMs}ms · 경로 ${options.length}개</div>`;
    options.forEach((o, i) => {
      const modes = (o.modes || []).map(m => modeKo[m] || m).join('·') || '도보';
      html += `<div class="opt" data-i="${i}">`
        + `<div class="optHead"><span class="optTag">${o.tag || ('경로 ' + (i + 1))}</span>`
        + `<b>${o.durationMin}분</b> · 환승 ${o.transfers}회 · ~${o.estimatedFareKrw.toLocaleString()}원</div>`
        + `<div class="times">${o.departure}→${o.arrival} · ${modes}</div>`
        + `<div class="legs"></div></div>`;
    });
    $('result').innerHTML = html;
    document.querySelectorAll('.opt').forEach(el =>
      el.addEventListener('click', () => select(parseInt(el.dataset.i))));
    select(0);
  }

  function select(idx) {
    document.querySelectorAll('.opt').forEach((el, i) => {
      el.classList.toggle('sel', i === idx);
      el.querySelector('.legs').innerHTML = i === idx ? legHtml(options[i].legs) : '';
    });
    if (routeLayer) map.removeLayer(routeLayer);
    if (nodeLayer) map.removeLayer(nodeLayer);
    const o = options[idx];
    nodeLayer = L.layerGroup().addTo(map);

    // 구간별 폴리라인(모드 색) + 지점 노드 마커(이름·시각)
    const allPts = [[origin.lat, origin.lng]];
    const segs = [];
    o.legs.forEach(l => {
      if (l.fromLat && l.toLat) {
        segs.push({ pts: [[l.fromLat, l.fromLon], [l.toLat, l.toLon]], color: modeColor[l.mode] || '#111827' });
        allPts.push([l.fromLat, l.fromLon], [l.toLat, l.toLon]);
        // 승차 지점 노드
        node(l.fromLat, l.fromLon, l.from, l.depart, l.mode);
      }
    });
    // 마지막 하차 지점 노드
    const last = o.legs[o.legs.length - 1];
    if (last && last.toLat) node(last.toLat, last.toLon, last.to, last.arrive, last.mode);
    allPts.push([dest.lat, dest.lng]);

    routeLayer = L.layerGroup(segs.map(s => L.polyline(s.pts, { color: s.color, weight: 5, opacity: 0.8 }))).addTo(map);
    const bounds = L.latLngBounds(allPts);
    map.fitBounds(bounds, { padding: [50, 50] });
  }

  function node(lat, lon, name, time, mode) {
    const mk = L.circleMarker([lat, lon], {
      radius: 6, color: '#fff', weight: 2, fillColor: modeColor[mode] || '#111827', fillOpacity: 1
    }).addTo(nodeLayer);
    mk.bindTooltip(`<b>${name}</b><br>${time}`, { direction: 'top', offset: [0, -6] });
  }

  function legHtml(legs) {
    return legs.map(l => {
      const badge = `<span class="badge ${l.mode}">${modeKo[l.mode] || l.mode}${l.route ? ' ' + l.route : ''}</span>`;
      return `<div class="leg">${badge}<div>${l.from} → ${l.to}<div class="times">${l.depart}-${l.arrive} (${l.min}분)</div></div></div>`;
    }).join('');
  }
</script>
</body>
</html>
